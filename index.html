<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Lopero - Hindi Dub Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#111;color:#fff}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#0d0d0f;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #222;
}

.logo{
font-weight:700;
font-size:20px;
color:#ff7a18;
}

.search{
background:#1a1a1f;
border:none;
padding:8px 15px;
color:#fff;
border-radius:4px;
width:250px;
}

/* HERO */
.hero{
padding:60px 40px;
background:#18181c;
}

.hero h1{
font-size:32px;
margin-bottom:10px;
}

.hero p{
color:#aaa;
}

/* FILTERS */
.filters{
padding:20px 40px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filters button{
background:#1a1a1f;
border:1px solid #333;
color:#fff;
padding:6px 14px;
cursor:pointer;
border-radius:4px;
font-size:13px;
}

.filters button:hover{
background:#ff7a18;
border-color:#ff7a18;
}

/* GRID */
.grid{
padding:30px 40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.card{
background:#1a1a1f;
border-radius:6px;
overflow:hidden;
cursor:pointer;
transition:.2s;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:14px;
}

.card:hover{
transform:scale(1.05);
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#1a1a1f;
padding:30px;
max-width:500px;
width:90%;
border-radius:8px;
}

.modal-content h2{
margin-bottom:10px;
}

.modal-content p{
color:#aaa;
margin-bottom:15px;
}

.close{
cursor:pointer;
float:right;
font-size:20px;
}

footer{
text-align:center;
padding:30px;
background:#0d0d0f;
color:#777;
margin-top:40px;
}
</style>
</head>

<body>

<nav>
<div class="logo">Anime Lopero</div>
<input class="search" type="text" placeholder="Search anime..." onkeyup="searchAnime()">
</nav>

<section class="hero">
<h1>Complete Hindi Dub Anime Directory</h1>
<p>Browse by platform and explore detailed info instantly.</p>
</section>

<section class="filters">
<button onclick="filterPlatform('all')">All</button>
<button onclick="filterPlatform('Netflix')">Netflix</button>
<button onclick="filterPlatform('Crunchyroll')">Crunchyroll</button>
<button onclick="filterPlatform('Disney+')">Disney+</button>
</section>

<section class="grid" id="animeGrid"></section>

<div class="modal" id="animeModal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<h2 id="modalTitle"></h2>
<p id="modalPlatform"></p>
<p>Hindi Dub Available</p>
</div>
</div>

<footer>
© 2026 Anime Lopero | Hindi Dub Archive
</footer>

<script>

/* ======= ADD ALL ANIME HERE ======= */

const animeList = [
{title:"Naruto", platform:"Netflix", img:"https://via.placeholder.com/300x400"},
{title:"Demon Slayer", platform:"Netflix", img:"https://via.placeholder.com/300x400"},
{title:"One Piece", platform:"Netflix", img:"https://via.placeholder.com/300x400"},
{title:"Jujutsu Kaisen", platform:"Crunchyroll", img:"https://via.placeholder.com/300x400"},
{title:"Solo Leveling", platform:"Crunchyroll", img:"https://via.placeholder.com/300x400"},
{title:"Tokyo Revengers", platform:"Disney+", img:"https://via.placeholder.com/300x400"}
];

/* RENDER */
function renderAnime(list){
const grid=document.getElementById("animeGrid");
grid.innerHTML="";
list.forEach(anime=>{
grid.innerHTML+=`
<div class="card" onclick="openModal('${anime.title}','${anime.platform}')">
<img src="${anime.img}">
<h3>${anime.title}</h3>
</div>
`;
});
}

renderAnime(animeList);

/* SEARCH */
function searchAnime(){
const input=document.querySelector(".search").value.toLowerCase();
const filtered=animeList.filter(a=>a.title.toLowerCase().includes(input));
renderAnime(filtered);
}

/* FILTER */
function filterPlatform(platform){
if(platform==="all"){
renderAnime(animeList);
}else{
const filtered=animeList.filter(a=>a.platform===platform);
renderAnime(filtered);
}
}

/* MODAL */
function openModal(title,platform){
document.getElementById("modalTitle").innerText=title;
document.getElementById("modalPlatform").innerText="Platform: "+platform;
document.getElementById("animeModal").style.display="flex";
}

function closeModal(){
document.getElementById("animeModal").style.display="none";
}

</script>

</body>
</html>
