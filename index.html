<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Lopero News</title>

<meta name="description" content="Latest Anime News, Hindi Dub Updates and Reviews.">

<link href="https://fonts.googleapis.com/css2?family=Georgia:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#f4f4f4;color:#111}

/* HEADER */
header{
background:#111;
color:#fff;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{font-size:22px;font-weight:700}

nav{
display:flex;
gap:15px;
flex-wrap:wrap;
}

nav button{
background:none;
border:none;
color:#ccc;
cursor:pointer;
font-size:14px;
}

nav button:hover{color:#fff}

.search{
background:#222;
border:none;
color:#fff;
padding:6px 12px;
border-radius:4px;
}

/* LAYOUT */
.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:30px;
padding:40px;
}

.featured{
background:#fff;
border-radius:6px;
overflow:hidden;
margin-bottom:30px;
cursor:pointer;
}

.featured img{
width:100%;
height:350px;
object-fit:cover;
}

.featured-content{
padding:20px;
}

.featured h1{
font-family:Georgia,serif;
font-size:26px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:6px;
overflow:hidden;
cursor:pointer;
transition:.2s;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h3{
font-family:Georgia,serif;
font-size:16px;
margin-bottom:8px;
}

.card p{
font-size:13px;
color:#666;
}

.card:hover{transform:translateY(-5px)}

.sidebar{
background:#fff;
padding:20px;
border-radius:6px;
height:fit-content;
}

.sidebar h2{margin-bottom:15px}

.trending-item{
margin-bottom:10px;
font-size:14px;
cursor:pointer;
}

.trending-item:hover{color:#e60023}

.pagination{
margin-top:30px;
text-align:center;
}

.pagination button{
padding:5px 10px;
margin:2px;
border:1px solid #ccc;
background:#fff;
cursor:pointer;
}

footer{
background:#111;
color:#ccc;
text-align:center;
padding:30px;
margin-top:40px;
font-size:13px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#fff;
padding:30px;
max-width:700px;
width:90%;
border-radius:6px;
max-height:80vh;
overflow-y:auto;
}

.close{
float:right;
cursor:pointer;
font-size:18px;
}

@media(max-width:900px){
.container{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
<div class="logo">Anime Lopero News</div>

<nav>
<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Anime News')">Anime News</button>
<button onclick="filterCategory('Hindi Dub')">Hindi Dub</button>
<button onclick="filterCategory('Review')">Review</button>
</nav>

<input class="search" type="text" placeholder="Search..." onkeyup="searchArticles()">
</header>

<div class="container">

<div>

<div class="featured" id="featuredArticle"></div>

<div class="grid" id="articleGrid"></div>

<div class="pagination" id="pagination"></div>

</div>

<div class="sidebar">
<h2>Trending</h2>
<div id="trendingList"></div>
</div>

</div>

<div class="modal" id="articleModal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<h2 id="modalTitle"></h2>
<p id="modalContent"></p>
</div>
</div>

<footer>
© 2026 Anime Lopero News
</footer>

<script>

/* ===== ADD YOUR ARTICLES HERE ===== */

const articles = [
{
title:"Massive Hindi Dub Anime Announcement",
category:"Hindi Dub",
image:"https://via.placeholder.com/1000x600",
content:"Several new anime titles are officially getting Hindi dubs this season."
},
{
title:"Top 10 Trending Anime This Week",
category:"Anime News",
image:"https://via.placeholder.com/400x300",
content:"These anime are dominating global charts right now."
},
{
title:"Solo Leveling Review",
category:"Review",
image:"https://via.placeholder.com/400x300",
content:"A detailed breakdown of story, animation and hype factor."
}
];

/* ===== SYSTEM CODE BELOW ===== */

let currentPage = 1;
const perPage = 6;
let filteredArticles = articles;

function renderFeatured(){
const featured = articles[0];
document.getElementById("featuredArticle").innerHTML = `
<img src="${featured.image}">
<div class="featured-content">
<h1 onclick="openModal('${featured.title}','${featured.content}')">${featured.title}</h1>
</div>`;
}

function renderArticles(){
const grid = document.getElementById("articleGrid");
grid.innerHTML = "";

const start = (currentPage-1)*perPage;
const paginated = filteredArticles.slice(start,start+perPage);

paginated.forEach(article=>{
grid.innerHTML += `
<div class="card" onclick="openModal('${article.title}','${article.content}')">
<img src="${article.image}">
<div class="card-content">
<h3>${article.title}</h3>
<p>${article.category}</p>
</div>
</div>`;
});

renderPagination();
}

function renderPagination(){
const pageCount = Math.ceil(filteredArticles.length/perPage);
const pagination = document.getElementById("pagination");
pagination.innerHTML="";
for(let i=1;i<=pageCount;i++){
pagination.innerHTML+=`<button onclick="goToPage(${i})">${i}</button>`;
}
}

function goToPage(page){
currentPage=page;
renderArticles();
}

function filterCategory(cat){
if(cat==="All"){
filteredArticles = articles;
}else{
filteredArticles = articles.filter(a=>a.category===cat);
}
currentPage=1;
renderArticles();
}

function searchArticles(){
const input=document.querySelector(".search").value.toLowerCase();
filteredArticles = articles.filter(a=>a.title.toLowerCase().includes(input));
currentPage=1;
renderArticles();
}

function openModal(title,content){
document.getElementById("modalTitle").innerText=title;
document.getElementById("modalContent").innerText=content;
document.getElementById("articleModal").style.display="flex";
}

function closeModal(){
document.getElementById("articleModal").style.display="none";
}

function renderTrending(){
const list=document.getElementById("trendingList");
articles.slice(0,5).forEach(a=>{
list.innerHTML+=`<div class="trending-item">${a.title}</div>`;
});
}

renderFeatured();
renderArticles();
renderTrending();

</script>

</body>
</html>
